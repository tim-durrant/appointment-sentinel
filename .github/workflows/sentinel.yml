name: Appointment Sentinel

on:
  workflow_dispatch:

# No longer needs contents: write — state is stored in repo variables, not files
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Run sentinel
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_TO:      ${{ secrets.ALERT_TO }}
          GH_REPO:       ${{ github.repository }}
          GH_PAT:        ${{ secrets.GH_PAT }}
        run: python sentinel.py

      - name: Upload debug screenshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore

      # No commit step needed — state lives in GitHub Variables now
